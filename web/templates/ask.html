{% extends "base.html" %}
{% block title %}Ask — Meridian{% endblock %}
{% block content %}
<h1 style="margin-bottom: 24px;">Ask Meridian</h1>

<form class="ask-form" method="POST" action="/ask">
    <textarea name="question" placeholder="Ask a question about your knowledge base...">{{ question }}</textarea>
    <button type="submit">Ask</button>
</form>

{% if answer_html %}
<div class="card">
    <h2>Answer</h2>
    <div class="article-content">{{ answer_html | safe }}</div>
</div>
{% endif %}
{% endblock %}
