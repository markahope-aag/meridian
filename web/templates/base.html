<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meridian{% endblock %}</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🧠</text></svg>'>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }

        .nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        .nav a { color: var(--text-muted); font-size: 14px; }
        .nav a:hover { color: var(--text); text-decoration: none; }

        /* Dropdown menu for the Browse navigation */
        .nav-dropdown {
            position: relative;
            display: inline-block;
        }
        .nav-dropdown-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            padding: 0;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .nav-dropdown-toggle:hover,
        .nav-dropdown.open .nav-dropdown-toggle {
            color: var(--text);
        }
        .nav-dropdown-toggle::after {
            content: "\25BE";
            font-size: 10px;
            margin-top: 1px;
        }
        .nav-dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            left: -8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px;
            min-width: 200px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
            z-index: 100;
        }
        .nav-dropdown.open .nav-dropdown-menu {
            display: block;
        }
        .nav-dropdown-menu a {
            display: block;
            padding: 8px 12px;
            color: var(--text);
            font-size: 13px;
            border-radius: 4px;
            text-decoration: none;
        }
        .nav-dropdown-menu a:hover {
            background: var(--bg);
            color: var(--accent);
            text-decoration: none;
        }
        .nav-dropdown-menu .menu-section {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 12px 4px;
        }
        .nav-dropdown-menu .menu-section:first-child {
            padding-top: 4px;
        }
        .nav-dropdown-menu hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 4px 0;
        }
        .nav-search {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }
        .nav-search input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 6px 12px;
            font-size: 14px;
            width: 280px;
        }
        .nav-search button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 14px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 { font-size: 16px; margin-bottom: 12px; color: var(--text-muted); }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .stat-box .number { font-size: 32px; font-weight: 700; color: var(--accent); }
        .stat-box .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .list-item:last-child { border-bottom: none; }
        .list-item .count {
            background: var(--bg);
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

        .log-entry { font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
        .log-entry:last-child { border-bottom: none; }
        .log-date { color: var(--text-muted); font-family: monospace; }

        .article-content {
            line-height: 1.8;
            font-size: 15px;
        }
        .article-content h1 { font-size: 1.8rem; font-weight: 700; margin: 1.5rem 0 0.75rem; }
        .article-content h2 { font-size: 1.4rem; font-weight: 600; margin: 1.25rem 0 0.5rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; }
        .article-content h3 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.5rem; }
        .article-content p { margin: 0.75rem 0; line-height: 1.7; }
        .article-content ul, .article-content ol { margin: 0.75rem 0; padding-left: 1.5rem; }
        .article-content li { margin: 0.25rem 0; line-height: 1.6; }
        .article-content strong { font-weight: 600; }
        .article-content em { font-style: italic; }
        .article-content blockquote { border-left: 3px solid var(--border); padding-left: 1rem; color: var(--text-muted); margin: 1rem 0; }
        .article-content pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .article-content code { font-family: monospace; font-size: 0.9em; background: var(--bg); padding: 0.1rem 0.3rem; border-radius: 3px; }
        .article-content pre code { background: none; padding: 0; }
        .article-content table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
        .article-content th, .article-content td {
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        .article-content th { background: var(--bg); font-weight: 600; }
        .article-content a { color: var(--accent); text-decoration: none; }
        .article-content a:hover { text-decoration: underline; }

        sup.citation {
            font-size: 0.7em;
            vertical-align: super;
            font-weight: 600;
            margin-left: 1px;
        }
        sup.citation a {
            color: var(--accent);
            text-decoration: none;
        }
        sup.citation a:hover { color: var(--accent-hover); text-decoration: underline; }
        sup.citation:target a,
        sup.citation a:focus {
            background: var(--accent);
            color: var(--bg);
            border-radius: 3px;
            padding: 0 3px;
            outline: none;
        }

        .source-backref {
            margin-left: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
        }
        .source-backref:hover { color: var(--accent); }
        .sources-list li:target { background: rgba(88,166,255,0.08); border-radius: 4px; }

        .sources-section {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--border);
        }
        .sources-section h2 {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }
        .sources-list {
            padding-left: 1.5rem;
            font-size: 0.85rem;
            line-height: 1.8;
        }
        .sources-list li { margin: 0.25rem 0; }
        .source-link { color: var(--accent); }
        .source-link:hover { text-decoration: underline; }
        .sources-subhead {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: -0.25rem 0 0.75rem 0;
        }
        .sources-subhead a { color: var(--accent); text-decoration: none; }
        .sources-subhead a:hover { text-decoration: underline; }

        .topic-backlink {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            padding: 10px 14px;
            margin-bottom: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .topic-backlink.synthesis-banner { border-left-color: var(--green); }
        .topic-backlink a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .topic-backlink a:hover { text-decoration: underline; }
        .topic-backlink-meta { color: var(--text-muted); }

        .fragments-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .fragments-header h2 { margin: 0; font-size: 1rem; }
        .fragments-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .fragment-search {
            flex: 1;
            min-width: 240px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 6px 10px;
            font-size: 13px;
            font-family: inherit;
        }
        .fragment-search:focus {
            border-color: var(--accent);
            outline: none;
        }
        .fragment-sort {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 6px 10px;
            font-size: 13px;
            font-family: inherit;
        }

        .client-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }
        .chip {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text-muted);
            padding: 3px 10px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
        }
        .chip:hover { color: var(--text); }
        .chip.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            font-weight: 600;
        }

        .fragment-match-count {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            min-height: 14px;
        }

        .fragment-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .fragment-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .fragment-item:last-child { border-bottom: none; }
        .fragment-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
        }
        .fragment-title {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .fragment-title:hover { text-decoration: underline; }
        .fragment-client-tag {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .fragment-preview {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.5;
        }
        .fragment-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            opacity: 0.75;
        }

        .download-btn {
            display: inline-block;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 12px;
            color: var(--text-muted);
            text-decoration: none;
            white-space: nowrap;
        }
        .download-btn:hover {
            color: var(--text);
            border-color: var(--accent);
            text-decoration: none;
        }

        .meta { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
        .meta span { margin-right: 16px; }
        .tag {
            display: inline-block;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 11px;
            color: var(--text-muted);
            margin: 2px;
        }

        .search-result { padding: 16px 0; border-bottom: 1px solid var(--border); }
        .search-result:last-child { border-bottom: none; }
        .search-result .title { font-size: 16px; }
        .search-result .excerpt { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .search-result .path { font-size: 11px; color: var(--text-muted); font-family: monospace; }

        .ask-form textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 12px;
            font-size: 15px;
            min-height: 80px;
            resize: vertical;
        }
        .ask-form button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 24px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 8px;
        }
        .answer { margin-top: 24px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="nav-brand">Meridian</span>
        <a href="/">Dashboard</a>
        <a href="/search">Search</a>
        <a href="/ask">Ask</a>
        <div class="nav-dropdown" id="browse-dropdown">
            <button type="button" class="nav-dropdown-toggle" id="browse-dropdown-toggle">Browse</button>
            <div class="nav-dropdown-menu">
                <div class="menu-section">Business</div>
                <a href="/knowledge/">Business Knowledge</a>
                <a href="/industries/">Industries</a>
                <a href="/clients/">Clients</a>
                <hr>
                <div class="menu-section">Engineering</div>
                <a href="/engineering/">Engineering Topics</a>
                <a href="/projects/">Projects</a>
                <hr>
                <div class="menu-section">Personal</div>
                <a href="/interests/">Personal Interests</a>
            </div>
        </div>
        <a href="/analytics/">Analytics</a>
        <a href="/graph/">Graph</a>
        <a href="/review/taxonomy">Review</a>
        <form class="nav-search" action="/search" method="get">
            <input type="text" name="q" placeholder="Search wiki..." value="{{ request.args.get('q', '') }}">
            <button type="submit">Search</button>
        </form>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
    (function () {
        var dd = document.getElementById('browse-dropdown');
        var btn = document.getElementById('browse-dropdown-toggle');
        if (!dd || !btn) return;
        btn.addEventListener('click', function (e) {
            e.stopPropagation();
            dd.classList.toggle('open');
        });
        document.addEventListener('click', function () {
            dd.classList.remove('open');
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') dd.classList.remove('open');
        });
    })();
    </script>
</body>
</html>
