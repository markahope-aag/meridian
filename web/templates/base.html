<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meridian{% endblock %}</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }

        .nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        .nav a { color: var(--text-muted); font-size: 14px; }
        .nav a:hover { color: var(--text); text-decoration: none; }
        .nav-search {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }
        .nav-search input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 6px 12px;
            font-size: 14px;
            width: 280px;
        }
        .nav-search button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 14px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 { font-size: 16px; margin-bottom: 12px; color: var(--text-muted); }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .stat-box .number { font-size: 32px; font-weight: 700; color: var(--accent); }
        .stat-box .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .list-item:last-child { border-bottom: none; }
        .list-item .count {
            background: var(--bg);
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

        .log-entry { font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
        .log-entry:last-child { border-bottom: none; }
        .log-date { color: var(--text-muted); font-family: monospace; }

        .article-content {
            line-height: 1.8;
            font-size: 15px;
        }
        .article-content h1 { font-size: 1.8rem; font-weight: 700; margin: 1.5rem 0 0.75rem; }
        .article-content h2 { font-size: 1.4rem; font-weight: 600; margin: 1.25rem 0 0.5rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; }
        .article-content h3 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.5rem; }
        .article-content p { margin: 0.75rem 0; line-height: 1.7; }
        .article-content ul, .article-content ol { margin: 0.75rem 0; padding-left: 1.5rem; }
        .article-content li { margin: 0.25rem 0; line-height: 1.6; }
        .article-content strong { font-weight: 600; }
        .article-content em { font-style: italic; }
        .article-content blockquote { border-left: 3px solid var(--border); padding-left: 1rem; color: var(--text-muted); margin: 1rem 0; }
        .article-content pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .article-content code { font-family: monospace; font-size: 0.9em; background: var(--bg); padding: 0.1rem 0.3rem; border-radius: 3px; }
        .article-content pre code { background: none; padding: 0; }
        .article-content table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
        .article-content th, .article-content td {
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        .article-content th { background: var(--bg); font-weight: 600; }
        .article-content a { color: var(--accent); text-decoration: none; }
        .article-content a:hover { text-decoration: underline; }

        .meta { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
        .meta span { margin-right: 16px; }
        .tag {
            display: inline-block;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 11px;
            color: var(--text-muted);
            margin: 2px;
        }

        .search-result { padding: 16px 0; border-bottom: 1px solid var(--border); }
        .search-result:last-child { border-bottom: none; }
        .search-result .title { font-size: 16px; }
        .search-result .excerpt { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .search-result .path { font-size: 11px; color: var(--text-muted); font-family: monospace; }

        .ask-form textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 12px;
            font-size: 15px;
            min-height: 80px;
            resize: vertical;
        }
        .ask-form button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 24px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 8px;
        }
        .answer { margin-top: 24px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="nav-brand">Meridian</span>
        <a href="/">Dashboard</a>
        <a href="/search">Search</a>
        <a href="/ask">Ask</a>
        <form class="nav-search" action="/search" method="get">
            <input type="text" name="q" placeholder="Search wiki..." value="{{ request.args.get('q', '') }}">
            <button type="submit">Search</button>
        </form>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
