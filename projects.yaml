# Meridian Projects Registry
#
# Projects are the "client" analog for the engineering knowledge namespace
# (wiki/engineering/). Each project contributes engineering learnings —
# via git history, claude-code transcripts, manual post-mortems, etc. —
# that get filed against the slugs below.
#
# The compiler and ingestors MUST match against this list. New projects
# require human approval — never silently create a new folder.
#
# Each entry:
#   name         — display name used in UI / dashboard
#   slug         — kebab-case, unique, filesystem-safe
#   description  — one-sentence scope statement
#   status       — active | dormant | archived
#   stack        — list of primary technologies / libraries (used for
#                  routing extractions through stack-appropriate prompts)
#   repo_path    — absolute path on the primary dev machine; used by
#                  scripts/ingest-git-history.py to walk commits

