# Meridian Industry Registry
#
# The third dimension of the knowledge system, alongside clients.yaml
# and topics.yaml. Represents VERTICAL slices — "what we know about
# working in industry X" — as distinct from topics (functional
# capabilities) and clients (individual engagements).
#
# The compiler MUST match against this taxonomy before cross-filing
# an insight into wiki/industries/<slug>/. New industries require
# human approval — the compiler never silently creates a new folder.
# New entries typically arrive via the dashboard's "taxonomy gap"
# review queue, which surfaces clients and fragments that don't map
# cleanly to any current industry.
#
# Each entry:
#   name        — display name used in dashboard headers
#   slug        — URL/directory slug (kebab-case, unique)
#   description — one-sentence scope statement for the dimension
#   aliases     — common variants the compiler should normalize to slug

industries:

  - name: "Healthcare"
    slug: healthcare
    description: "Medical practices, clinics, digital health, telehealth, and patient-facing health services. Includes HIPAA-bound workflows."
    aliases:
      - medical
      - medical-practice
      - clinic
      - health-services
      - digital-health
      - telehealth
      - patient-care

