# Meridian Configuration
# Secrets are injected via environment variables — never hardcode them here.
# Required env vars: ANTHROPIC_API_KEY

# Paths (relative to project root)
paths:
  capture: capture/
  raw: raw/
  wiki: wiki/
  outputs: outputs/
  tools: tools/
  agents: agents/
  prompts: prompts/

# LLM settings
llm:
  model: claude-sonnet-4-6
  max_tokens: 4096
  temperature: 0.3

# Daily Distill settings
# Threshold is enforced by the LLM via prompts/daily_distill.md, not by code.
# These values are documentation only — change the prompt to change behavior.
distill:
  promote_threshold: 8               # both relevance and quality must be >= this to promote
  approval_email: mark.hope@asymmetric.pro

# Compilation settings
compiler:
  bootstrap_threshold: 20      # switch to steady state after this many wiki articles
  planning_model: claude-haiku-4-5-20251001   # fast model for filing decisions
  writing_model: claude-sonnet-4-6            # quality model for article content

# Domain stability profiles — how fast different knowledge domains change.
# Used by both the synthesizer (to set default rate_of_change and
# web_monitoring_frequency on new Layer 3 articles) and the evolution
# detector (to set per-domain contradiction sensitivity thresholds).
domain_stability:
  fundamental:
    description: "Human psychology, direct response, core principles"
    change_sensitivity: 0.5     # contradiction threshold for evolution detector (50% of new fragments must contradict)
    web_monitoring: quarterly
    expected_half_life: decades
    rate_of_change: stable
    examples: [copywriting, direct-response, brand-psychology]
  strategy:
    description: "Marketing strategy, channel strategy, buyer journey"
    change_sensitivity: 0.3
    web_monitoring: quarterly
    expected_half_life: years
    rate_of_change: slow
    examples: [content-marketing, brand-strategy, go-to-market]
  platform-tactics:
    description: "How to use platforms effectively"
    change_sensitivity: 0.2
    web_monitoring: monthly
    expected_half_life: years-to-months
    rate_of_change: moderate
    examples: [google-ads, seo, meta-ads, email-marketing]
  platform-mechanics:
    description: "Specific platform rules, settings, algorithms"
    change_sensitivity: 0.1
    web_monitoring: weekly
    expected_half_life: months
    rate_of_change: high
    examples: [google-ads-bidding, meta-targeting, algorithm-specifics]
  regulatory:
    description: "Laws, policies, compliance requirements"
    change_sensitivity: 0.0     # any contradicting fragment triggers evolution
    web_monitoring: continuous
    expected_half_life: unpredictable
    rate_of_change: volatile
    examples: [fda-compliance, hipaa, privacy-law, platform-policies]

# Evolution detector — weekly scan for signs Layer 3 knowledge is changing
evolution:
  schedule: "0 8 * * 0"         # Sundays at 08:00 UTC (after the Saturday lint)
  stale_threshold_days: 180     # Check 4 (confidence decay): article is "old" if last_updated > this many days ago
  platform_trigger_keywords:    # Check 3: explicit platform/regulatory change language
    - "announced"
    - "policy change"
    - "algorithm update"
    - "new requirement"
    - "effective "
    - "banned"
    - "required as of"
    - "google announced"
    - "meta changed"
    - "as of [date]"
  contradiction_keywords:       # Check 1: language signaling disagreement with established patterns.
                                # Keep tight — generic words like "changed" and "as of" appear
                                # constantly in commit messages and produce false positives. These
                                # are deliberate strong signals only.
    - "no longer"
    - "deprecated"
    - "superseded by"
    - "replaced by"
    - "now requires"
    - "breaking change"
    - "no longer supported"
    - "removed in"

# Synthesis settings — Layer 3 knowledge generation
synthesis:
  fragments_before_synthesis: 3    # trigger synthesis after N new fragments
  synthesis_per_day: 5             # max topics synthesized daily
  bootstrap_threshold: 6           # distill score threshold < 20 articles
  steady_state_threshold: 8        # distill score threshold >= 20 articles

# n8n integration
n8n:
  base_url: https://auto.asymmetric.pro
  # API key via N8N_API_KEY env var
